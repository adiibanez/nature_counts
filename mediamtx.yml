###############################################
# MediaMTX — RTSP hub + WebRTC/HLS output
###############################################

rtspTransports: [udp, tcp]

# WebRTC for low-latency browser playback
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: ""
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: yes
webrtcAdditionalHosts: []

# HLS as fallback
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 500ms

paths:
  # --- RAW camera inputs ---
  raw-cam1:
    runOnInit: >
      ffmpeg -re -stream_loop -1
      -i /videos/rtsp-ready/P5_2025-03-07_420.mp4
      -an -c:v copy
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  raw-cam2:
    runOnInit: >
      ffmpeg -re -stream_loop -1
      -i /videos/rtsp-ready/cam_1.mp4
      -an -c:v copy
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  raw-cam3:
    runOnInit: >
      ffmpeg -re -stream_loop -1
      -i /videos/rtsp-ready/cam_2.mp4
      -an -c:v copy
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  # --- Processed output from DeepStream ---
  cam1:
  cam2:
  cam3:

  # Wildcard: accepts any RTSP publisher on any path
  all_others:
