%YAML:1.0
################################################################################
# NvDCF tracker tuned for underwater fish tracking.
#
# Fish appearance changes rapidly (rotation, light refraction, turbulence),
# so we rely more on IOU/position continuity than visual similarity.
# Shadow tracking age is high to survive brief occlusions and missed detections.
################################################################################

BaseConfig:
  minDetectorConfidence: 0

TargetManagement:
  enableBboxUnClipping: 1
  maxTargetsPerStream: 150

  # [Creation & Termination Policy]
  minIouDiff4NewTarget: 0.4    # Lower than default — fish can overlap more
  minTrackerConfidence: 0.05   # Lower threshold before shadow mode — keep tracking through appearance changes
  probationAge: 2              # Confirm new tracks quickly (fish appear/disappear at edges)
  maxShadowTrackingAge: 120    # Keep lost tracks for ~4s at 30fps — survive occlusions and detector gaps
  earlyTerminationAge: 3       # Raised from 1 — give tentative tracks time to survive inference interval gaps

TrajectoryManagement:
  useUniqueID: 0
  enableReAssoc: 1    # Re-associate broken tracks (critical for track continuity)

  # [Re-Assoc: Motion-based]
  minTrajectoryLength4Projection: 6     # Shorter than default — fish tracks are shorter-lived
  prepLength4TrajectoryProjection: 6
  trajectoryProjectionLength: 120       # Project ~4s ahead

  # [Re-Assoc: Trajectory Similarity — relaxed for underwater]
  minTrackletMatchingScore: 0.2         # Lower than default — fish trajectories are less predictable
  maxAngle4TrackletMatching: 90         # Fish can change direction sharply
  minSpeedSimilarity4TrackletMatching: 0.05  # Fish speed varies a lot
  minBboxSizeSimilarity4TrackletMatching: 0.3  # Size changes as fish turn
  maxTrackletMatchingTimeSearchRange: 120

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1     # GLOBAL matching — better for multiple similar-looking fish
  checkClassMatch: 1

  # [Association Metric: Thresholds — relaxed for fish]
  minMatchingScore4Overall: 0.0
  minMatchingScore4SizeSimilarity: 0.3
  minMatchingScore4Iou: 0.0
  minMatchingScore4VisualSimilarity: 0.2   # Very low — fish appearance is unreliable

  # [Association Metric: Weights — favor position over appearance]
  matchingScoreWeight4VisualSimilarity: 0.2  # Low weight on appearance
  matchingScoreWeight4SizeSimilarity: 0.2    # Some weight on size consistency
  matchingScoreWeight4Iou: 0.6              # Primary signal: spatial overlap

StateEstimator:
  stateEstimatorType: 2  # REGULAR — better motion prediction for swimming fish

  # [Dynamics Modeling — tuned for smooth fish movement]
  processNoiseVar4Loc: 4.0     # Higher — fish can change direction
  processNoiseVar4Size: 2.0    # Fish bbox size varies as they turn
  processNoiseVar4Vel: 0.5     # Moderate velocity changes
  measurementNoiseVar4Detector: 4.0
  measurementNoiseVar4Tracker: 8.0    # Lower than default — trust tracker more

VisualTracker:
  visualTrackerType: 1  # NvDCF

  # [NvDCF: Feature Extraction]
  useColorNames: 1
  useHog: 0              # Skip HOG — not useful underwater
  featureImgSizeLevel: 3  # Bumped from 2 — more visual info to bridge inference interval gaps
  featureFocusOffsetFactor_y: -0.2

  # [NvDCF: Correlation Filter — faster adaptation for fish]
  filterLr: 0.15         # Higher learning rate — adapt to appearance changes faster
  filterChannelWeightsLr: 0.2
  gaussianSigma: 0.75
