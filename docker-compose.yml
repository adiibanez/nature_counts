volumes:
  pgdata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: naturecounts
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-naturecounts_dev}"
      POSTGRES_DB: naturecounts
      PGPORT: "5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naturecounts -p 5433"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP
      - "8189:8189"   # WebRTC ICE (TCP)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./videos:/videos
    restart: unless-stopped

  # deepstream-python:
  #   build:
  #     context: ./deepstream-python
  #     dockerfile: Dockerfile.ds64
  #   runtime: nvidia
  #   environment:
  #     NVIDIA_VISIBLE_DEVICES: all
  #     NVIDIA_DRIVER_CAPABILITIES: all
  #     DS_CONFIG_DIR: /opt/nvidia/deepstream/deepstream-6.4/samples/configs/deepstream-app-fish
  #     SOURCE_URIS: "rtsp://mediamtx:8554/raw-cam1,rtsp://mediamtx:8554/raw-cam2,rtsp://mediamtx:8554/raw-cam3"
  #     FILE_LOOP: "0"
  #     RTSP_BITRATE: "4000000"
  #     PHOENIX_URL: ws://phoenix:4005/deepstream/websocket
  #     DEEPSTREAM_TOKEN: "${DEEPSTREAM_TOKEN:-dev-secret-token}"
  #   volumes:
  #     - ./deepstream-app-fish:/opt/nvidia/deepstream/deepstream-6.4/samples/configs/deepstream-app-fish
  #     - ./deepstream-python/ds_fish_pipeline.py:/app/ds_fish_pipeline.py:ro
  #     - ./deepstream-python/phoenix_channel_client.py:/app/phoenix_channel_client.py:ro
  #     - ./videos:/videos
  #   depends_on:
  #     - mediamtx
  #     - phoenix
  #   restart: unless-stopped

  deepstream:
    build:
      context: ./deepstream-cpp
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      # Skip plugin registry scan — uses 100% CPU and the container already has a pre-built registry
      GST_REGISTRY_UPDATE: "no"
      GST_REGISTRY_FORK: "no"
      DS_CONFIG_DIR: /opt/nvidia/deepstream/deepstream-6.4/samples/configs/deepstream-app-fish
      SOURCE_URIS: "rtsp://mediamtx:8554/raw-cam1,rtsp://mediamtx:8554/raw-cam2,rtsp://mediamtx:8554/raw-cam3"
      FILE_LOOP: "0"
      RTSP_BITRATE: "4000000"
      PHOENIX_URL: ws://phoenix:4005/deepstream/websocket
      DEEPSTREAM_TOKEN: "${DEEPSTREAM_TOKEN:-dev-secret-token}"
      # Set to 0 to disable thumbnail generation on boot (can be toggled at runtime from UI)
      ENABLE_THUMBNAILS: "${ENABLE_THUMBNAILS:-0}"
    volumes:
      - ./deepstream-app-fish:/opt/nvidia/deepstream/deepstream-6.4/samples/configs/deepstream-app-fish
      - ./videos:/videos
    depends_on:
      mediamtx:
        condition: service_started
      phoenix:
        condition: service_healthy
    restart: unless-stopped

  phoenix:
    build:
      context: ./phoenix-app
      dockerfile: Dockerfile
    runtime: nvidia
    ports:
      - "4005:4005"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PORT: "4005"
      PHX_SERVER: "true"
      PHX_HOST: "localhost"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:-0wVxOLNApegdWg+tV6G37XCrEtIbz0X/NwoAp0jRR3/bai8tjzvUhnNzGh9Ffwkp}"
      DEEPSTREAM_TOKEN: "${DEEPSTREAM_TOKEN:-dev-secret-token}"
      NUM_CAMERAS: "3"
      MEDIAMTX_HOST: "localhost:8889"
      # Set CAMERAS=rtsp to use Membrane RTSP pipelines (requires Membrane).
      # Set to "webrtc" or omit to use MediaMTX WebRTC (default).
      CAMERAS: "${CAMERAS:-webrtc}"
      DEEPSTREAM_RTSP_BASE: "rtsp://deepstream:8554/cam"
      DATABASE_URL: "ecto://naturecounts:${POSTGRES_PASSWORD:-naturecounts_dev}@postgres:5433/naturecounts"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      VLM_MODEL: "${VLM_MODEL:-claude-sonnet-4-6}"
      YOLO_MODEL_PATH: "/models/cfd-yolov12x-1.00.pt"
      FISHIAL_MODEL_DIR: "/models/fishial"
    volumes:
      - ./videos:/videos
      - ./deepstream-app-fish:/models
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4005/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    restart: unless-stopped
